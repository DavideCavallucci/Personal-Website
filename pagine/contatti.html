<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <title>Contattami - Davide Cavallucci | UX/UI Designer</title>
    <meta name="theme-color" content="#ffffff"/>
    <meta name="description" content="Contatta Davide Cavallucci, UX/UI Designer e sviluppatore. Compila il modulo per collaborazioni, idee e richieste.">
    <link rel="icon" type="image/webp" href="../assets/images/Logo.webp">

    <meta property="og:title" content="Davide Cavallucci - Contatti"/>
    <meta property="og:description" content="Hai un progetto in mente? Scrivimi e ti risponderò il prima possibile!"/>
    <meta property="og:type" content="Website"/>
    <meta property="og:url" content="https://davidecavallucci.github.io/Personal-Website/pagine/contatti.html"/>
    <meta property="og:image" content="../assets/images/Open-Graph/Contatti.webp"/>
    <meta property="og:locale" content="it_IT">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/scss/style.css">

    <script src="../assets/js/components.js"></script>
    <script src="../assets/js/theme-logic.js"></script>
</head>

<body class="contact-body my-body"> 

<app-header></app-header>

<button id="back-to-top" class="back-to-top" aria-label="Torna in cima">
    <i class="fa-solid fa-arrow-up"></i>
</button>

<main class="contact-page container my-5">
    
    <section class="contact text-center reveal">
        <div class="contact-container">
            <h1 class="title-section" id="contact-heading">Parliamo del tuo progetto.</h1>
            <p class="text contact-text lead mb-5">
                Compila il form qui in basso per collaborazioni, idee o semplicemente per un saluto.<br>Ti risponderò il prima possibile!
            </p>
        </div>
    </section>

    <section class="contact-form reveal" id="contact-form">
        <div class="contact-form-container mx-auto premium-card">
            
            <div class="form-header text-center mb-5">
                <h2 class="h3 fw-bold" style="color: var(--primary);">Scrivimi un messaggio</h2>
            </div>

            <form class="my-form" aria-labelledby="contact-heading" id="contact-form-element">
                <div class="row g-4">
                    
                    <div class="col-md-6">
                        <div class="custom-input-wrapper">
                            <i class="fa-regular fa-user input-icon"></i>
                            <input type="text" id="name" name="name" required placeholder=" " aria-required="true">
                            <label for="name">Nome completo</label>
                        </div>
                    </div>
                    
                    <div class="col-md-6">
                        <div class="custom-input-wrapper">
                            <i class="fa-regular fa-envelope input-icon"></i>
                            <input type="email" id="email" name="email" required placeholder=" " aria-required="true">
                            <label for="email">Indirizzo Email</label>
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="custom-input-wrapper textarea-wrapper">
                            <i class="fa-regular fa-comment-dots input-icon"></i>
                            <textarea id="message" name="message" rows="5" required placeholder=" " aria-required="true"></textarea>
                            <label for="message">Come posso aiutarti?</label>
                        </div>
                    </div>

                    <div class="col-12 mt-4 text-center">
                        <button type="submit" class="my-btn type-1 w-100 btn-glow" id="submit-btn" aria-label="Invia il modulo">
                            Invia Messaggio
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </section>
</main>

<div class="space" aria-hidden="true"></div>

<app-footer></app-footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script src="../assets/js/form.js"></script>
<script src="../assets/js/back-to-top.js"></script>
<script src="../assets/js/scroll-reveal.js"></script> 

</body>
</html>
